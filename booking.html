<!DOCTYPE html>
<html lang="zh-Hant">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        預約系統｜Mr. Chang
    </title>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/booking.css">

</head>

<body>

    <nav class="navbar">

        <img
            src="assets/logo1.png"
            class="nav-logo"
            alt="Mr. Chang">

        <button id="menuBtn">
            ☰
        </button>

    </nav>

    <div
        id="mobileMenu"
        class="mobile-menu">
    </div>

    <main class="booking-page">

        <div class="booking-card">

            <a
                href="profile.html"
                class="back-home">

                ← 返回會員中心

            </a>

            <img
                src="assets/logo1.png"
                class="auth-logo"
                alt="Mr. Chang">

            <h1>
                預約系統
            </h1>
            
            <div class="booking-notice">
            
                <p>
                    請選擇欲預約日期和時間。
                </p>
            
            </div>
            
            <div
                class="slot-list"
                id="slotList">
            
            </div>

        </div>

    </main>

    <div id="modalOverlay"></div>

    <div id="bookingModal">
    
        <div class="modal-content">
    
            <h2 id="modalSlot">
                預約時段
            </h2>
    
            <textarea
                id="modalBookingNote"
                placeholder="候補時間/其他需求（選填）"
            ></textarea>
    
            <button id="confirmBookingBtn">
                確認預約
            </button>
    
        </div>
    
    </div>

    <script src="js/script.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/booking.js"></script>

</body>

</html>
