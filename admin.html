<!DOCTYPE html>
<html lang="zh-Hant">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        管理員後台
    </title>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">

</head>

<body>

    <main class="profile-page">

        <h1>
            管理員後台
        </h1>

        <h2>
            👤 一般會員
        </h2>

        <details class="booking-card">

            <summary>

                <span id="adminName">
                    尚無資料
                </span>

            </summary>

            <div class="booking-detail">

                <div class="info-item">

                    <span>
                        電話
                    </span>

                    <span id="adminPhone">

                        尚無資料

                    </span>

                </div>

                <div class="info-item">

                    <span>
                        生日
                    </span>

                    <span id="adminBirthday">

                        尚無資料

                    </span>

                </div>

                <div class="info-item">

                    <span>
                        預約時段
                    </span>

                    <span id="adminBookingDate">

                        尚無資料

                    </span>

                </div>

                <div class="info-item">

                    <span>
                        送出時間
                    </span>

                    <span id="adminBookingTime">

                        尚無資料

                    </span>

                </div>

                <div class="info-item">

                    <span>
                        其他需求
                    </span>

                    <span id="adminBookingNote">

                        無

                    </span>

                </div>

                <div class="info-item">

                    <span>
                        狀態
                    </span>

                    <span id="adminStatus">

                        等待確認

                    </span>

                </div>

                <br>

                <button
                    id="confirmBtn"
                    class="primary-btn">

                    確認預約

                </button>

                <br><br>

                <button
                    id="waitingBtn"
                    class="secondary-btn">

                    轉入候補

                </button>

                <br><br>

                <button
                    id="cancelBtn"
                    class="logout-btn">

                    取消預約

                </button>

            </div>

        </details>

    </main>

    <script src="js/admin.js"></script>

</body>

</html>
