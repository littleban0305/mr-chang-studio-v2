<!DOCTYPE html>
<html lang="zh-Hant">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        管理員後台
    </title>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">

</head>

<body>

    <main class="admin-page">

        <div class="admin-header">

            <h1>
                管理員後台
            </h1>

            <p>
                Mr. Chang Studio 預約管理系統
            </p>

        </div>

        <div class="admin-dashboard">

            <div class="dashboard-card">

                <h3 id="totalBookings">
                    0
                </h3>

                <p>
                    總預約數
                </p>

            </div>

            <div class="dashboard-card">

                <h3 id="vipCount">
                    0
                </h3>

                <p>
                    VIP會員
                </p>

            </div>

            <div class="dashboard-card">

                <h3 id="normalCount">
                    0
                </h3>

                <p>
                    普通會員
                </p>

            </div>

            <div class="dashboard-card">
            
                <h3 id="blacklistCount">
                    0
                </h3>
            
                <p>
                    黑名單
                </p>
            
            </div>

        </div>

        <div
            id="vipSection"
            class="admin-section">

            <h2>
                VIP
            </h2>

        </div>

        <div
            id="normalSection"
            class="admin-section">

            <h2>
                一般會員
            </h2>

        </div>

        <div
            id="blacklistSection"
            class="admin-section">

            <h2>
                黑名單
            </h2>

        </div>

    </main>

    <script src="js/admin.js"></script>

</body>

</html>
