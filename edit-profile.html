<!DOCTYPE html>
<html lang="zh-Hant">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        編輯會員資料
    </title>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">

</head>

<body>

    <main class="auth-page">

        <div class="auth-card">

            <img
                src="assets/logo1.png"
                class="auth-logo"
                alt="Mr. Chang">

            <h1>
                編輯會員資料
            </h1>

            <p>
                修改已儲存的會員資料
            </p>

            <div class="form-group">

                <label>
                    姓名
                </label>
            
                <input
                    id="memberName"
                    placeholder="請輸入姓名"
                >
            
            </div>

            <div class="form-group">
            
                <label>
                    電話
                </label>
            
                <input
                    id="memberPhone"
                    placeholder="09xxxxxxxx"
                >
            
            </div>

            <div class="form-group">
            
                <label>
                    生日
                </label>
            
                <input
                    type="date"
                    id="memberBirthday"
                >
            
            </div>

            <br><br>

            <button
                id="saveProfileBtn"
                class="primary-btn">

                完成

            </button>

        </div>

    </main>

    <div id="loadingOverlay">
    
        <div class="loadingBox">
    
            <div class="spinner"></div>
    
            <p id="loadingText">
                資料同步中...
            </p>
    
        </div>
    
    </div>

    <script src="js/script.js"></script>
    <script src="js/edit-profile.js"></script>

</body>

</html>
