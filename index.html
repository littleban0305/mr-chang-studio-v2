<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mr. Chang 張老師工作室</title>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
</head>

<body>

    <nav class="navbar">
    
        <img src="assets/logo1.png" class="nav-logo">
    
        <button id="menuBtn">
            ☰
        </button>
    
    </nav>
    
    <div id="mobileMenu" class="mobile-menu">
    </div>

    <main class="hero">
    
        <div class="hero-content">
    
            <img
                src="assets/logo.png"
                class="brand-logo"
                alt="Mr. Chang 張老師工作室">
        
            <p class="description">
                專屬預約系統
            </p>
    
            <div class="hero-buttons">
            
                <a
                    id="bookingEntryBtn"
                    class="primary-btn"
                >
                    載入中...
                </a>
                
                <a
                    id="memberBtn"
                    class="secondary-btn"
                >
                    載入中...
                </a>
            
            </div>
    
        </div>
    
    </main>

    <section
        class="announcement-section"
    >
    
        <h2>
            最新公告
        </h2>
    
        <div
            id="announcementList"
        >
    
            載入中...
    
        </div>
    
    </section>

    <section class="environment">
    
        <h2>環境介紹</h2>
    
        <div class="environment-grid">
    
            <div class="env-card">
    
                <img
                    src="assets/images/clinic.jpg"
                    alt="操作區">
    
                <span class="env-tag">
                    操作區
                </span>
    
            </div>
    
            <div class="env-card">
    
                <img
                    src="assets/images/waiting.jpg"
                    alt="等待區">
    
                <span class="env-tag">
                    等待區
                </span>
    
            </div>
    
        </div>
    
    </section>

    <section class="location">

        <h2>工作室位置</h2>
    
        <div id="locationContent">
    
            <p>
                登入會員後可查看詳細地址
            </p>
    
        </div>
    
    </section>

    <section class="booking-rules">
    
        <h2>預約規則</h2>
    
        <div class="rules-grid">
    
            <div>
                ...
            </div>
    
            <div>
                ...
            </div>
    
            <div>
                ...
            </div>
    
        </div>
    
        <img
            src="assets/booking-rules.jpg"
            class="rules-image"
            alt="預約時段說明">
    
    </section>

    <div id="loadingOverlay">
    
        <div class="loadingBox">
    
            <div class="spinner"></div>
    
            <p id="loadingText">
                資料同步中...
            </p>
    
        </div>
    
    </div>

    <script src="js/script.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/index.js"></script>
    <script src="js/home.js"></script>

</body>

</html>
